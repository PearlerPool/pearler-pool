<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pearler Pool — The first cult for pearl hunters</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#07090e;--fg:#e9e6dd;--muted:#727884;--line:rgba(233,230,221,.14);--chip:rgba(233,230,221,.05);--gold:#c9a84c;--pearl:#fff3d0}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--fg);overflow:hidden;font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;-webkit-font-smoothing:antialiased}
  #binary{position:fixed;inset:0;z-index:0}
  .beam{position:fixed;top:-8%;width:160px;height:120%;z-index:1;pointer-events:none;mix-blend-mode:screen;background:linear-gradient(180deg,rgba(233,230,221,.07),rgba(233,230,221,0));filter:blur(6px)}
  .beam.b1{left:14%;transform:skewX(-9deg);animation:beam 11s ease-in-out infinite}
  .beam.b2{left:46%;transform:skewX(7deg);animation:beam 14s ease-in-out infinite reverse}
  .beam.b3{right:16%;transform:skewX(-6deg);animation:beam 9s ease-in-out infinite}
  @keyframes beam{0%,100%{opacity:.4}50%{opacity:.85}}
  .depth{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(20,40,70,.18) 0%,rgba(7,9,14,0) 26%,rgba(7,9,14,0) 60%,rgba(2,4,9,.7) 100%)}
  #bubbles{position:fixed;inset:0;z-index:2;pointer-events:none}
  #seafloor{position:fixed;left:0;bottom:0;width:100%;height:auto;z-index:2;pointer-events:none}
  #diver{position:fixed;right:6%;bottom:17%;width:min(300px,40vw);z-index:3;pointer-events:none;transform-origin:50% 50%;animation:sink 9s ease-in-out infinite;filter:drop-shadow(0 8px 26px rgba(0,0,0,.65))}
  @keyframes sink{0%,100%{transform:translateY(0) rotate(9deg)}50%{transform:translateY(16px) rotate(6deg)}}
  .vignette{position:fixed;inset:0;z-index:4;pointer-events:none;background:radial-gradient(135% 100% at 28% 36%,transparent 36%,rgba(2,4,9,.62) 100%)}
  .halo{animation:pulse 3.4s ease-in-out infinite}
  .halo.d2{animation-duration:4.2s;animation-delay:.6s}.halo.d3{animation-duration:3s;animation-delay:1.1s}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:.85}}
  .kelp{transform-origin:bottom center;animation:sway 7s ease-in-out infinite}
  .kelp.k3{animation-duration:6s;animation-delay:.4s}
  @keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  .topbar{position:fixed;top:0;left:0;width:100%;z-index:6;display:flex;justify-content:space-between;align-items:center;padding:24px 36px;font-size:13px;letter-spacing:2px}
  .wordmark{display:flex;align-items:center;gap:10px;color:var(--fg);text-decoration:none}
  .wordmark .dot{width:11px;height:11px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fffaf0,var(--gold));box-shadow:0 0 10px rgba(201,168,76,.6)}
  .topbar .status{color:var(--muted)}
  .wrap{position:fixed;inset:0;z-index:6;display:flex;align-items:center;padding:0 36px 210px;pointer-events:none}
  .col{width:min(640px,100%);text-align:left;pointer-events:auto}
  .kicker{font-size:12px;letter-spacing:3px;color:var(--muted);margin-bottom:22px}
  .kicker b{color:var(--gold);font-weight:500}
  h1{font-weight:500;font-size:clamp(30px,5vw,58px);line-height:1.08;letter-spacing:-.5px;color:var(--fg);text-shadow:0 2px 30px rgba(0,0,0,.5)}
  .lede{margin-top:22px;font-size:clamp(14px,1.5vw,16px);line-height:1.9;color:var(--muted);max-width:560px;font-weight:300}
  .tags{margin-top:26px;display:flex;flex-wrap:wrap;gap:8px}
  .tags span{font-size:11px;letter-spacing:1.5px;color:var(--muted);border:1px solid var(--line);background:var(--chip);padding:6px 11px;backdrop-filter:blur(2px)}
  .rule{margin:32px 0;height:1px;width:100%;max-width:520px;background:repeating-linear-gradient(90deg,var(--line) 0 4px,transparent 4px 9px)}
  .label{font-size:11px;letter-spacing:3px;color:var(--muted);margin-bottom:12px}
  form{display:flex;align-items:stretch;max-width:430px;border:1px solid var(--line);background:rgba(7,9,14,.55);backdrop-filter:blur(4px)}
  input{flex:1;background:transparent;border:none;outline:none;color:var(--fg);font-size:14px;font-family:inherit;padding:14px 16px;letter-spacing:.5px}
  input::placeholder{color:#4a5059}
  button.submit{border:none;border-left:1px solid var(--line);cursor:pointer;background:transparent;color:var(--fg);font-family:inherit;font-size:12px;letter-spacing:2px;padding:0 20px;transition:.2s}
  button.submit:hover{background:var(--fg);color:var(--bg)}
  .msg{margin-top:12px;font-size:12px;letter-spacing:1px;color:var(--gold);min-height:15px;opacity:0;transition:.3s}
  .msg.show{opacity:1}
  .contact{margin-top:22px;font-size:12px;letter-spacing:2px;color:var(--muted)}
  .contact a{color:var(--fg);text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:2px;transition:.2s}
  .contact a:hover{border-color:var(--fg)}
  .foot{position:fixed;bottom:0;left:0;width:100%;z-index:6;display:flex;justify-content:space-between;padding:20px 36px;font-size:11px;letter-spacing:2px;color:var(--muted)}
  @media(max-width:720px){#diver{opacity:.3;right:-6%}.foot .r,.topbar .status{display:none}.wrap{padding-bottom:150px}}
</style>
</head>
<body>
<canvas id="binary"></canvas>
<div class="beam b1"></div><div class="beam b2"></div><div class="beam b3"></div>
<div class="depth"></div>
<canvas id="bubbles"></canvas>

  <path d="M0,196 C260,168 520,210 820,186 C1080,166 1280,206 1440,188 L1440,300 L0,300 Z" fill="#04050a"/>

  <ellipse cx="1080" cy="210" rx="92" ry="30" fill="#06080d" stroke="#e9e6dd" stroke-width="1.2" stroke-opacity=".18"/>

  <path class="kelp k3" d="M1300,206 C1284,168 1318,148 1300,106 C1288,80 1308,64 1298,42" fill="none" stroke="#e9e6dd" stroke-width="3" opacity=".16"/>
  <use href="#clam" transform="translate(150,118) scale(1.05)"/>
  <use href="#clam" transform="translate(470,150) scale(.8)" class="d2"/>
  <use href="#clam" transform="translate(820,128) scale(1.15)"/>
  <use href="#clam" transform="translate(1170,150) scale(.9)" class="d3"/>
</svg>

<svg id="diver" viewBox="0 0 360 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="helm" cx=".34" cy=".3" r=".8"><stop offset="0" stop-color="#e2e7ea"/><stop offset=".55" stop-color="#aab3ba"/><stop offset="1" stop-color="#79838b"/></radialGradient>
    <radialGradient id="dglass" cx=".38" cy=".34" r=".8"><stop offset="0" stop-color="#3a6383"/><stop offset=".6" stop-color="#173247"/><stop offset="1" stop-color="#0a1622"/></radialGradient>
    <radialGradient id="ddisc" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="#04060b" stop-opacity=".6"/><stop offset="1" stop-color="#04060b" stop-opacity="0"/></radialGradient>
  </defs>
  <ellipse cx="160" cy="210" rx="185" ry="195" fill="url(#ddisc)"/>
  <g stroke="#05080d" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
    <path d="M196,78 q70,-30 120,-12 q26,10 28,40" fill="none" stroke="#2b333b" stroke-width="10"/>
    <path d="M196,78 q70,-30 120,-12 q26,10 28,40" fill="none" stroke="#4a525b" stroke-width="3" opacity=".7"/>
    <path d="M196,206 q44,6 40,72 q-2,18 -20,16 q2,-46 -28,-72 z" fill="#1d2630"/>
    <path d="M138,280 q-10,50 -4,80 q4,16 -12,18 q-22,-2 -22,-24 q0,-42 14,-78 z" fill="#222c36"/>
    <path d="M196,282 q12,50 8,80 q-2,16 14,16 q22,-2 20,-24 q-4,-44 -18,-78 z" fill="#222c36"/>
    <path d="M96,352 q-8,18 8,28 q26,10 44,-2 q8,-14 -4,-26 z" fill="#2b333b"/>

    <path d="M196,354 q-2,20 14,28 q26,8 44,-6 q4,-16 -10,-24 z" fill="#2b333b"/>
    <path d="M200,374 q26,10 50,-4" fill="none" stroke="#cfd6db" stroke-width="5"/>
    <path d="M112,198 q60,-28 100,0 q16,42 4,90 q-14,32 -54,32 q-40,0 -54,-32 q-12,-48 4,-90 z" fill="#222c36"/>
    <path d="M150,214 q12,40 0,86 M186,214 q-8,40 2,84" fill="none" stroke="#0e141b" stroke-width="2" opacity=".55"/>
    <path d="M124,206 q-44,14 -46,66 q-2,18 16,20 q6,-46 50,-62 z" fill="#222c36"/>
    <ellipse cx="84" cy="296" rx="19" ry="17" fill="#2b333b"/>
    <path d="M84,290 l-34,74" fill="none" stroke="#3f454d" stroke-width="10"/>
    <path d="M84,290 l-34,74" fill="none" stroke="#5a626b" stroke-width="3" opacity=".7"/>
    <path d="M34,350 q24,-10 38,8 q10,18 -8,30 q-24,10 -36,-8 q-8,-20 6,-30 z" fill="#9aa4ac"/>
    <path d="M70,284 q16,-2 22,10" fill="none" stroke="#3f454d" stroke-width="8"/>
    <path d="M106,200 q54,-36 108,0 q6,18 -10,28 q-46,-24 -90,0 q-14,-10 -8,-28 z" fill="#b3bbc1"/>
    <g fill="#dfe4e7" stroke-width="1.2"><circle cx="120" cy="206" r="2.6"/><circle cx="150" cy="196" r="2.6"/><circle cx="180" cy="196" r="2.6"/><circle cx="202" cy="206" r="2.6"/></g>
    <circle cx="150" cy="122" r="70" fill="url(#helm)"/>
    <path d="M92,150 q58,40 116,0" fill="none" stroke="#79838b" stroke-width="3" opacity=".6"/>
    <circle cx="146" cy="126" r="52" fill="#9aa4ac"/>
    <circle cx="146" cy="126" r="40" fill="url(#dglass)"/>
    <ellipse cx="130" cy="112" rx="10" ry="15" fill="#bfe0f5" opacity=".4" stroke="none"/>
    <path d="M120,108 q18,-12 40,-4" fill="none" stroke="#cfe4f5" stroke-width="4" opacity=".5"/>
    <g fill="#dfe4e7" stroke-width="1.2"><circle cx="146" cy="78" r="3.2"/><circle cx="178" cy="90" r="3.2"/><circle cx="192" cy="122" r="3.2"/><circle cx="180" cy="156" r="3.2"/><circle cx="148" cy="172" r="3.2"/><circle cx="114" cy="158" r="3.2"/><circle cx="102" cy="124" r="3.2"/><circle cx="114" cy="92" r="3.2"/></g>
    <rect x="138" y="46" width="24" height="16" rx="5" fill="#9aa4ac"/>
    <circle cx="150" cy="44" r="8" fill="#c2c9ce"/>
    <circle cx="84" cy="122" r="11" fill="#9aa4ac"/>
    <circle cx="84" cy="122" r="5" fill="#11202e"/>
    <path d="M108,92 q22,-22 54,-16" fill="none" stroke="#eef3f6" stroke-width="5" opacity=".45"/>
    <g fill="none" stroke="#bfe3ff" stroke-width="2.4" opacity=".55"><circle cx="160" cy="36" r="5"/><circle cx="176" cy="16" r="3.6"/><circle cx="150" cy="8" r="4"/></g>
  </g>
</svg>

<div class="vignette"></div>

<div class="topbar">
  <a class="wordmark" href="#"><span class="dot"></span>PEARLER POOL</a>
  <span class="status">[ PRL ]</span>
</div>

<div class="wrap">
  <div class="col">
    <p class="kicker">// COMING SOON</p>
    <h1>The first cult for<br/>pearl hunters.</h1>
    <p class="lede">A pool for the proof-of-useful-work coin where every block is a verified matrix multiplication. Let's hunt some PRLs.</p>
    <div class="tags"><span>PRL</span><span>POOL MINING</span><span>PROOF-OF-USEFUL-WORK</span></div>
    <div class="rule"></div>
    <p class="label">FOR LIVE UPDATES</p>
    <form id="waitlist">
      <input id="email" type="email" placeholder="you@example.com" required aria-label="Email address" />
      <button class="submit" type="submit">NOTIFY →</button>
    </form>
    <p class="msg" id="msg"></p>
    <p class="contact">CONTACT US → <a href="https://discord.gg/w6tTBXTh" target="_blank" rel="noopener">DISCORD ↗</a></p>
  </div>
</div>

<div class="foot"><span>PEARLERPOOL.COM</span><span class="r">EST. 2026</span></div>

<script>
(function(){
  var bc=document.getElementById('binary'),bx=bc.getContext('2d'),fs=14,cols,drops,frame=0;
  function bsize(){bc.width=innerWidth;bc.height=innerHeight;cols=Math.ceil(bc.width/(fs*1.5));drops=[];for(var i=0;i<cols;i++)drops[i]=Math.random()*bc.height/fs;bx.fillStyle='#07090e';bx.fillRect(0,0,bc.width,bc.height);}
  bsize();addEventListener('resize',bsize);
  function rain(){requestAnimationFrame(rain);frame++;if(frame%2)return;bx.fillStyle='rgba(7,9,14,0.11)';bx.fillRect(0,0,bc.width,bc.height);bx.font='400 '+fs+'px "IBM Plex Mono",monospace';
    for(var i=0;i<cols;i++){var ch=Math.random()<.5?'0':'1';var x=i*fs*1.5;var y=drops[i]*fs;var bright=Math.random()<.025;bx.fillStyle='rgba(233,230,221,'+(bright?0.48:0.07)+')';bx.fillText(ch,x,y);if(y>bc.height&&Math.random()>.975)drops[i]=0;drops[i]+=0.33;}}
  rain();
  var uc=document.getElementById('bubbles'),ux=uc.getContext('2d'),bubs=[];
  function usize(){uc.width=innerWidth;uc.height=innerHeight;}usize();addEventListener('resize',usize);
  for(var i=0;i<46;i++)bubs.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:1+Math.random()*2.6,s:.3+Math.random()*.7,w:Math.random()*6.28});
  function bub(){requestAnimationFrame(bub);ux.clearRect(0,0,uc.width,uc.height);
    for(var i=0;i<bubs.length;i++){var b=bubs[i];b.y-=b.s;b.x+=Math.sin(b.y*.02+b.w)*.3;if(b.y<-10){b.y=uc.height+10;b.x=Math.random()*uc.width;}
      ux.beginPath();ux.arc(b.x,b.y,b.r,0,6.28);ux.strokeStyle='rgba(191,227,255,.16)';ux.lineWidth=1;ux.stroke();}}
  bub();
  var form=document.getElementById('waitlist'),msg=document.getElementById('msg'),btn=form.querySelector('button');
  function showThanks(){
    if(document.getElementById('thanks-overlay'))return;
    var ov=document.createElement('div');
    ov.id='thanks-overlay';
    ov.style.cssText='position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(4,6,11,.8);opacity:0;transition:opacity .35s';
    var card=document.createElement('div');
    card.style.cssText='text-align:center;border:1px solid rgba(233,230,221,.16);background:rgba(7,9,14,.96);padding:46px 40px;max-width:430px;transform:translateY(10px);transition:transform .35s';
    card.innerHTML='<div style="width:46px;height:46px;border-radius:50%;margin:0 auto 22px;background:radial-gradient(circle at 35% 30%,#fffaf0,#c9a84c);box-shadow:0 0 26px rgba(201,168,76,.55)"></div><div style="font-size:22px;letter-spacing:.3px;color:#e9e6dd;margin-bottom:12px">Thank You for Registering</div><div style="font-size:13px;line-height:1.8;color:#727884">You’re on the list, Pearler. Watch your inbox — and come hunt with us on <a href="https://discord.gg/w6tTBXTh" target="_blank" rel="noopener" style="color:#00d4ff;text-decoration:none;border-bottom:1px solid rgba(0,212,255,.4)">Discord</a>.</div><button id="thanks-close" style="margin-top:26px;font-family:inherit;font-size:11px;letter-spacing:2px;color:#e9e6dd;background:transparent;border:1px solid rgba(233,230,221,.2);padding:10px 22px;cursor:pointer">CLOSE</button>';
    ov.appendChild(card);document.body.appendChild(ov);
    requestAnimationFrame(function(){ov.style.opacity='1';card.style.transform='translateY(0)';});
    function close(){ov.style.opacity='0';setTimeout(function(){if(ov.parentNode)ov.parentNode.removeChild(ov);},350);}
    ov.addEventListener('click',function(e){if(e.target===ov)close();});
    card.querySelector('#thanks-close').onclick=close;
  }
  form.addEventListener('submit',function(ev){ev.preventDefault();var email=document.getElementById('email').value.trim();if(!email)return;btn.disabled=true;
    fetch('/api/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,source:'landing'})})
      .then(function(r){if(!r.ok)throw 0;msg.style.color='#c9a84c';msg.textContent='> YOU ARE ON THE LIST. WELCOME, PEARLER.';msg.classList.add('show');form.reset();showThanks();})
      .catch(function(){msg.style.color='#d98a6a';msg.textContent='> SOMETHING WENT WRONG. PLEASE TRY AGAIN.';msg.classList.add('show');})
      .finally(function(){btn.disabled=false;});});
})();
</script>
</body>
</html>
